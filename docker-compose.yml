version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: contractor-os-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: contractor_os
      POSTGRES_USER: contractor_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contractor_user -d contractor_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────
  backend:
    build: ./backend
    container_name: contractor-os-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://contractor_user:${DB_PASSWORD:-changeme_in_production}@db:5432/contractor_os?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_this_to_64_random_chars}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads

  # ── Frontend ─────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: contractor-os-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  uploads:
